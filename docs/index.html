<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Color 3D Print — STL Generator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
  <h1>Multi-Color 3D Print</h1>
  <p class="subtitle">Upload per-color PNGs → Download print-ready STLs + slicer guide</p>
</header>

<main>
  <div class="layout">

    <!-- Left panel: settings + layers -->
    <section class="panel left-panel">

      <!-- Print Settings -->
      <div class="card">
        <h2>Print Settings</h2>
        <div class="form-row">
          <label>Width (mm)
            <input type="number" id="width_mm" value="85.725" step="0.001" min="1">
          </label>
          <label>Height (mm)
            <input type="number" id="height_mm" value="53.975" step="0.001" min="1">
          </label>
        </div>
        <div class="form-row">
          <label>Nozzle (mm)
            <select id="nozzle_mm">
              <option value="0.2">0.2mm</option>
              <option value="0.4" selected>0.4mm</option>
              <option value="0.6">0.6mm</option>
              <option value="0.8">0.8mm</option>
            </select>
          </label>
          <label>Layer height (mm)
            <input type="number" id="layer_height_mm" value="0.2" step="0.05" min="0.05" max="0.5">
          </label>
        </div>
      </div>

      <!-- Presets -->
      <div class="card">
        <h2>Presets</h2>
        <div class="preset-row">
          <select id="preset_select">
            <option value="">— Load preset —</option>
          </select>
          <button class="btn btn-secondary" id="load_preset_btn">Load</button>
          <input type="text" id="preset_name" placeholder="Preset name">
          <button class="btn btn-secondary" id="save_preset_btn">Save</button>
          <button class="btn btn-danger" id="delete_preset_btn" title="Delete selected preset">✕</button>
        </div>
      </div>

      <!-- Layers -->
      <div class="card">
        <div class="layers-header">
          <h2>Layers <span class="layer-hint">(bottom → top)</span></h2>
          <button class="btn btn-primary" id="add_layer_btn">+ Add Layer</button>
        </div>
        <div id="layers_list"></div>
      </div>

      <!-- Generate -->
      <div class="generate-bar">
        <button class="btn btn-generate" id="generate_btn">
          Generate STLs + Guide
        </button>
        <span id="generate_status"></span>
      </div>

    </section>

    <!-- Right panel: preview -->
    <section class="panel right-panel">
      <div class="card preview-card">
        <h2>Layer Preview</h2>
        <p class="preview-hint">Upload PNGs to see a composite preview</p>
        <div class="canvas-wrap">
          <canvas id="preview_canvas"></canvas>
        </div>
        <div id="preview_legend"></div>
      </div>
    </section>

  </div>
</main>

<!-- Layer row template (cloned by JS) -->
<template id="layer_template">
  <div class="layer-row" data-index="">
    <div class="layer-header">
      <span class="layer-num"></span>
      <input class="layer-name" type="text" placeholder="Layer name" value="">
      <button class="btn btn-danger btn-sm remove-layer-btn" title="Remove layer">✕</button>
    </div>
    <div class="layer-body">
      <label class="upload-label">
        <span>PNG</span>
        <input class="layer-file" type="file" accept="image/png">
        <span class="file-name">No file chosen</span>
      </label>
      <label class="color-label">
        Color
        <input class="layer-color" type="color" value="#ffffff">
      </label>
      <label>
        Height (mm)
        <input class="layer-height" type="number" value="0.8" step="0.1" min="0.1">
      </label>
      <label>
        Alpha threshold
        <input class="layer-threshold" type="number" value="128" min="0" max="255">
      </label>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
